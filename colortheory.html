  <body bgcolor=lightgrey>
      <h1>COLOR THEORY</h1>
    <br /><br />
    <div class="main">
      <div class="parent">
        <h2>COLORNAME</h2>
        <div class="child" id="color"></div>
      </div>
      <div class="parent">
        <h2>HEXA</h2>
        <div class="child" id="hexa"></div>
      </div>
      <div class="parent">
        <h2>RGB</h2>
        <div class="child" id="rgb"></div>
      </div>
      <div class="parent">
        <h2>RGBA</h2>
        <div class="child" id="rgba"></div>
      </div>
      <div class="parent">
        <h2>HSL</h2>
        <div class="child" id="hsl"></div>

        </div>

          <h2>Repeating Linear_Gradient</h2>
          <div class="child" id="rlg"></div>
        </div>
        <div class="parent1">
          <h2>Radial_Gradient</h2>
          <div class="child" id="rg"></div>
        </div>
        <div class="parent1">
          <h2>Repeating Radial_Gradient</h2>
